<!DOCTYPE html>
<html lang="en">
<head>
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 id="heading">Hello </h2>

    <div class="color-container">

        <button class="color-box" onclick="changeColor(this,'red')">Red</button>
        <button class="color-box" onclick="changeColor(this,'blue')">Blue</button>
        <button class="color-box" onclick="changeColor(this,'green')">Green</button>
        <button class="color-box" onclick="changeColor(this,'yellow')">Yellow</button>

    </div>

    <div class="input-box">
        <input type="text" id="nameInput" placeholder="Enter Name">

        <button onclick="changeName()">Greet</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
